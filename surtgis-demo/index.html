<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurtGIS Demo - Geospatial Analysis in Your Browser</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900">
    <div class="flex h-screen">
        <!-- Map -->
        <div id="map" class="flex-1"></div>

        <!-- Sidebar -->
        <div id="sidebar" class="w-96 bg-white shadow-lg flex flex-col">
            <!-- Tabs -->
            <div class="flex border-b">
                <button id="tabLocal" class="flex-1 py-2 text-xs font-medium text-blue-600 border-b-2 border-blue-600">Local</button>
                <button id="tabStac" class="flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700">STAC</button>
                <button id="tabVector" class="flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700">Vector</button>
                <button id="tabLayers" class="flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700">Layers</button>
            </div>

            <!-- Tab Content -->
            <div class="flex-1 overflow-y-auto">

                <!-- ═══ LOCAL TAB ═══ -->
                <div id="panelLocal" class="p-4">
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">GeoTIFF DEM</label>
                        <input type="file" id="demFile" accept=".tif,.tiff" class="w-full px-2 py-1 border border-gray-300 rounded text-xs">
                        <button id="loadDemoBtn" class="mt-1 w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-1.5 px-3 rounded transition text-xs">
                            Load Demo DEM (Andes 512x512)
                        </button>
                        <div id="fileStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Algorithm</label>
                        <select id="algorithm" class="w-full px-2 py-1.5 border border-gray-300 rounded text-xs">
                            <optgroup label="Terrain">
                                <option value="slope">Slope (degrees)</option>
                                <option value="aspect">Aspect (0-360)</option>
                                <option value="hillshade">Hillshade</option>
                                <option value="multidirectional_hillshade">Multi-Hillshade</option>
                                <option value="tpi">TPI</option>
                                <option value="tri">TRI</option>
                                <option value="northness">Northness</option>
                                <option value="eastness">Eastness</option>
                                <option value="curvature_general">Curvature (general)</option>
                                <option value="curvature_profile">Curvature (profile)</option>
                                <option value="curvature_plan">Curvature (plan)</option>
                                <option value="dev">DEV</option>
                                <option value="geomorphons">Geomorphons</option>
                                <option value="shape_index">Shape Index</option>
                                <option value="curvedness">Curvedness</option>
                            </optgroup>
                            <optgroup label="Hydrology">
                                <option value="fill">Fill Depressions</option>
                                <option value="priority_flood">Priority Flood</option>
                                <option value="flow_direction">Flow Direction</option>
                                <option value="flow_accumulation">Flow Accumulation</option>
                                <option value="twi">TWI</option>
                                <option value="hand">HAND</option>
                            </optgroup>
                            <optgroup label="Morphology">
                                <option value="erode">Erosion</option>
                                <option value="dilate">Dilation</option>
                                <option value="opening">Opening</option>
                                <option value="closing">Closing</option>
                            </optgroup>
                            <optgroup label="Statistics">
                                <option value="focal_mean">Focal Mean</option>
                                <option value="focal_std">Focal Std Dev</option>
                                <option value="focal_range">Focal Range</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="mb-3 grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-600">Radius:</label>
                            <input type="number" id="radius" min="1" max="50" value="3" class="w-full px-2 py-1 border border-gray-300 rounded text-xs">
                        </div>
                        <div>
                            <label class="text-xs text-gray-600">Azimuth:</label>
                            <input type="number" id="azimuth" min="0" max="360" value="315" class="w-full px-2 py-1 border border-gray-300 rounded text-xs">
                        </div>
                    </div>

                    <div class="mb-3 grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-600">Colormap:</label>
                            <select id="colormap" class="w-full px-2 py-1 border border-gray-300 rounded text-xs">
                                <option value="auto">Auto</option>
                                <option value="viridis">Viridis</option>
                                <option value="plasma">Plasma</option>
                                <option value="terrain">Terrain</option>
                                <option value="gray">Grayscale</option>
                                <option value="seismic">Seismic</option>
                                <option value="hsv">HSV</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-gray-600">Opacity: <span id="opacityVal">90%</span></label>
                            <input type="range" id="opacity" min="0" max="100" value="90" class="w-full">
                        </div>
                    </div>

                    <div class="flex gap-2 mb-3">
                        <button id="computeBtn" disabled class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">Compute</button>
                        <button id="downloadBtn" disabled class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-3 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">Download</button>
                    </div>

                    <!-- Feature Stack -->
                    <div class="mb-3 border-t border-gray-200 pt-3">
                        <button id="featureStackBtn" disabled class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-2 px-3 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                            Generate Feature Stack (14 layers)
                        </button>
                        <p class="text-xs text-gray-400 mt-1">Computes all terrain features at once for ML</p>
                        <div id="featureStackProgress" class="mt-1 text-xs text-gray-500"></div>
                    </div>
                </div>

                <!-- ═══ STAC TAB ═══ -->
                <div id="panelStac" class="p-4 hidden">
                    <!-- Step 1: Catalog -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">1. Catalog</label>
                        <div class="flex gap-1 mb-1">
                            <input type="text" id="stacSearch" placeholder="Search catalogs..." class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs">
                            <button id="stacSearchBtn" class="bg-blue-600 text-white px-2 py-1 rounded text-xs hover:bg-blue-700">Search</button>
                        </div>
                        <!-- Quick catalogs -->
                        <div class="space-y-0.5 mb-1">
                            <button data-stac-url="https://planetarycomputer.microsoft.com/api/stac/v1" class="stac-quick w-full text-left px-2 py-1 bg-blue-50 hover:bg-blue-100 rounded text-xs truncate">Planetary Computer</button>
                            <button data-stac-url="https://earth-search.aws.element84.com/v1" class="stac-quick w-full text-left px-2 py-1 bg-blue-50 hover:bg-blue-100 rounded text-xs truncate">Earth Search (AWS)</button>
                            <button data-stac-url="https://planetarycomputer.microsoft.com/api/stac/v1" data-collection="cop-dem-glo-30" class="stac-quick w-full text-left px-2 py-1 bg-green-50 hover:bg-green-100 rounded text-xs truncate">Copernicus DEM 30m (quick)</button>
                            <button data-stac-url="https://planetarycomputer.microsoft.com/api/stac/v1" data-collection="sentinel-2-l2a" class="stac-quick w-full text-left px-2 py-1 bg-green-50 hover:bg-green-100 rounded text-xs truncate">Sentinel-2 L2A (quick)</button>
                            <button data-stac-url="https://planetarycomputer.microsoft.com/api/stac/v1" data-collection="landsat-c2-l2" class="stac-quick w-full text-left px-2 py-1 bg-green-50 hover:bg-green-100 rounded text-xs truncate">Landsat C2 L2 (quick)</button>
                        </div>
                        <div id="stacCatalogResults" class="max-h-32 overflow-y-auto border border-gray-200 rounded text-xs hidden"></div>
                        <div id="stacCatalogStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <!-- Step 2: Collection -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">2. Collection</label>
                        <select id="stacCollection" class="w-full px-2 py-1 border border-gray-300 rounded text-xs" disabled>
                            <option value="">-- select catalog first --</option>
                        </select>
                        <div id="stacCollectionInfo" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <!-- Step 3: Search area -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">3. Search Area</label>
                        <button id="drawBboxBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-medium py-1.5 px-3 rounded transition text-xs mb-1">
                            Draw bbox on map
                        </button>
                        <div id="bboxDisplay" class="text-xs text-gray-500 font-mono"></div>
                        <div class="grid grid-cols-2 gap-1 mt-1">
                            <div>
                                <label class="text-xs text-gray-600">From:</label>
                                <input type="date" id="stacDateFrom" value="2024-06-01" class="w-full px-1 py-0.5 border border-gray-300 rounded text-xs">
                            </div>
                            <div>
                                <label class="text-xs text-gray-600">To:</label>
                                <input type="date" id="stacDateTo" value="2024-08-31" class="w-full px-1 py-0.5 border border-gray-300 rounded text-xs">
                            </div>
                        </div>
                        <input type="number" id="stacMaxItems" value="5" min="1" max="20" class="w-full px-2 py-0.5 border border-gray-300 rounded text-xs mt-1" placeholder="Max items">
                    </div>

                    <!-- Step 4: Search -->
                    <div class="mb-4">
                        <button id="stacSearchItems" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                            Search Items
                        </button>
                        <div id="stacItemsStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <!-- Step 5: Results -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">4. Results</label>
                        <div id="stacResults" class="max-h-40 overflow-y-auto border border-gray-200 rounded text-xs bg-gray-50 p-1">
                            <p class="text-gray-400 p-2">No results yet</p>
                        </div>
                    </div>

                    <!-- Step 6: Single Asset -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">5a. Single Band</label>
                        <select id="stacAsset" class="w-full px-2 py-1 border border-gray-300 rounded text-xs" disabled>
                            <option value="">-- search items first --</option>
                        </select>
                        <div class="flex gap-1 mt-1">
                            <button id="stacPreviewBtn" disabled class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-1.5 px-2 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                                Preview (fast)
                            </button>
                            <button id="stacDownloadBtn" disabled class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-2 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                                Full Download
                            </button>
                        </div>
                        <div id="stacDownloadStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <!-- Step 7: Multi-band -->
                    <div class="mb-4 border-t border-gray-200 pt-3">
                        <label class="block text-xs font-medium text-gray-700 mb-1">5b. Multi-band</label>
                        <div class="space-y-1">
                            <!-- RGB Composite -->
                            <div class="p-2 bg-red-50 rounded border border-red-100">
                                <p class="text-xs font-medium text-gray-700 mb-1">RGB Composite</p>
                                <div class="grid grid-cols-3 gap-1">
                                    <div>
                                        <label class="text-xs text-red-600">R:</label>
                                        <select id="rgbR" class="w-full px-1 py-0.5 border rounded text-xs" disabled></select>
                                    </div>
                                    <div>
                                        <label class="text-xs text-green-600">G:</label>
                                        <select id="rgbG" class="w-full px-1 py-0.5 border rounded text-xs" disabled></select>
                                    </div>
                                    <div>
                                        <label class="text-xs text-blue-600">B:</label>
                                        <select id="rgbB" class="w-full px-1 py-0.5 border rounded text-xs" disabled></select>
                                    </div>
                                </div>
                                <button id="rgbBtn" disabled class="mt-1 w-full bg-red-600 hover:bg-red-700 text-white font-medium py-1.5 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                                    Download RGB Composite
                                </button>
                            </div>
                            <!-- NDVI -->
                            <div class="p-2 bg-green-50 rounded border border-green-100">
                                <p class="text-xs font-medium text-gray-700 mb-1">NDVI (vegetation)</p>
                                <div class="grid grid-cols-2 gap-1">
                                    <div>
                                        <label class="text-xs text-gray-600">NIR:</label>
                                        <select id="ndviNir" class="w-full px-1 py-0.5 border rounded text-xs" disabled></select>
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-600">Red:</label>
                                        <select id="ndviRed" class="w-full px-1 py-0.5 border rounded text-xs" disabled></select>
                                    </div>
                                </div>
                                <button id="ndviBtn" disabled class="mt-1 w-full bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                                    Compute NDVI
                                </button>
                            </div>
                        </div>
                        <div id="multibandStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>
                </div>

                <!-- ═══ VECTOR TAB ═══ -->
                <div id="panelVector" class="p-4 hidden">
                    <!-- Upload -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Load Vector</label>
                        <input type="file" id="vectorFile" accept=".geojson,.json,.kml,.gpx" class="w-full px-2 py-1 border border-gray-300 rounded text-xs">
                        <p class="text-xs text-gray-400 mt-0.5">GeoJSON, KML, GPX</p>
                        <div id="vectorStatus" class="text-xs text-gray-500 mt-1"></div>
                    </div>

                    <!-- Style -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Style</label>
                        <div class="grid grid-cols-3 gap-1">
                            <div>
                                <label class="text-xs text-gray-600">Color:</label>
                                <input type="color" id="vecColor" value="#e74c3c" class="w-full h-6 rounded cursor-pointer">
                            </div>
                            <div>
                                <label class="text-xs text-gray-600">Weight:</label>
                                <input type="number" id="vecWeight" min="1" max="10" value="2" class="w-full px-1 py-0.5 border rounded text-xs">
                            </div>
                            <div>
                                <label class="text-xs text-gray-600">Fill:</label>
                                <input type="range" id="vecFillOpacity" min="0" max="100" value="20" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- Features info -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Features</label>
                        <div id="vectorFeatures" class="max-h-32 overflow-y-auto border border-gray-200 rounded text-xs bg-gray-50 p-1">
                            <p class="text-gray-400 p-2">No vector loaded</p>
                        </div>
                    </div>

                    <!-- Zonal Stats -->
                    <div class="mb-4 border-t border-gray-200 pt-3">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Zonal Statistics</label>
                        <p class="text-xs text-gray-400 mb-1">Compute stats of topmost raster inside each polygon</p>
                        <button id="zonalStatsBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-1.5 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                            Compute Zonal Stats
                        </button>
                        <div id="zonalResults" class="mt-2 max-h-40 overflow-y-auto text-xs"></div>
                    </div>

                    <!-- Clip -->
                    <div class="mb-4 border-t border-gray-200 pt-3">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Clip Raster</label>
                        <p class="text-xs text-gray-400 mb-1">Mask topmost raster to polygon boundaries</p>
                        <button id="clipRasterBtn" disabled class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-medium py-1.5 rounded transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                            Clip Raster by Polygons
                        </button>
                    </div>
                </div>

                <!-- ═══ LAYERS TAB ═══ -->
                <div id="panelLayers" class="p-4 hidden">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs font-medium text-gray-700">Layers</label>
                        <button id="clearLayersBtn" class="text-xs text-red-500 hover:text-red-700">Clear all</button>
                    </div>

                    <!-- Workspace Save/Load -->
                    <div class="flex gap-1 mb-3">
                        <button id="saveWorkspaceBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-1.5 rounded transition text-xs">
                            Save Workspace
                        </button>
                        <button id="loadWorkspaceBtn" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-medium py-1.5 rounded transition text-xs">
                            Load Workspace
                        </button>
                        <input type="file" id="workspaceFileInput" accept=".surtgis,.json" class="hidden">
                    </div>
                    <div id="layerPanel" class="border border-gray-200 rounded p-2 text-xs bg-gray-50 max-h-64 overflow-y-auto">
                        <div class="flex items-center gap-2 py-0.5">
                            <input type="checkbox" id="layerGrid" checked>
                            <label for="layerGrid" class="text-gray-700 flex-1">Graticule</label>
                        </div>
                        <div class="flex items-center gap-2 py-0.5">
                            <input type="checkbox" id="layerBase" checked>
                            <label for="layerBase" class="text-gray-700 flex-1">Base map</label>
                        </div>
                        <div id="rasterLayers"></div>
                        <div class="mt-2 pt-1 border-t border-gray-200">
                            <label class="text-xs text-gray-600">Base map:</label>
                            <select id="basemapSelect" class="w-full px-1 py-0.5 border border-gray-300 rounded text-xs mt-0.5">
                                <option value="osm">OpenStreetMap</option>
                                <option value="satellite">Satellite (ESRI)</option>
                                <option value="topo">Topographic</option>
                                <option value="dark">Dark (CartoDB)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status bar -->
            <div class="p-2 border-t bg-gray-50 text-xs text-gray-500 flex justify-between">
                <span id="coords">Lat: --, Lon: --</span>
                <span id="pixelValue">Value: --</span>
            </div>
            <div class="px-2 py-1 border-t">
                <p id="status" class="text-xs text-gray-600">Loading WASM...</p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=4"></script>
</body>
</html>
