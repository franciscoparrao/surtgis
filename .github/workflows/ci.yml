name: CI

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]
  schedule:
    # 07:00 UTC daily for nightly RAM benchmark (net-dependent, not per-PR)
    - cron: '0 7 * * *'
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  # `-D warnings` is enforced on the dedicated clippy step below, not
  # globally on every cargo invocation. The latter promotes every benign
  # warning across feature combos (unused imports under
  # --no-default-features, dead_code under feature-gated targets, etc.)
  # to a hard build failure even in jobs whose purpose is just to verify
  # things compile and tests pass.

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The PyPI wheel version (crates/python/pyproject.toml) is independent of
      # the Cargo workspace version and has silently drifted before (it sat at
      # 0.8.1 while the crates were 0.15.x). Fail fast if they disagree.
      - name: Version consistency (workspace vs pyproject)
        run: |
          ws=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          py=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/python/pyproject.toml | head -1)
          echo "workspace=$ws  pyproject=$py"
          if [ "$ws" != "$py" ]; then
            echo "::error::version mismatch: Cargo workspace $ws != pyproject $py"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # System libs required by --all-features:
      #   libgdal-dev    → gdal-sys (surtgis-core's optional gdal feature)
      #   libhdf5-dev    → hdf5-metno-sys (transitively via netcdf feature)
      #   libnetcdf-dev  → netcdf crate (surtgis-cloud's netcdf feature)
      #   libeccodes-dev → eccodes-sys (surtgis-cloud's grib feature)
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libhdf5-dev libnetcdf-dev libeccodes-dev pkg-config
      - name: Check
        run: cargo check --workspace --exclude surtgis-python --all-features
      # Clippy enforces correctness lints as errors (real bugs only) and
      # leaves style lints as warnings. Style cleanup (`collapsible_if`,
      # `map_or` simplification, etc.) is tracked separately and applied
      # in dedicated `cargo clippy --fix` sweeps. Sustainable for a
      # multi-feature codebase where the union of clippy warnings across
      # feature combinations runs into the hundreds.
      - name: Clippy
        run: cargo clippy --workspace --exclude surtgis-python --all-features -- -D clippy::correctness -W warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libhdf5-dev libnetcdf-dev libeccodes-dev pkg-config
      - name: Run tests (full workspace)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace --exclude surtgis-python
      # macOS/Windows: core crates with default features. This is where a
      # hand-rolled binary parser meets foreign paths/CRLF/endianness —
      # previously these platforms were only ever exercised as release
      # builds, so platform bugs surfaced at release time, not in PRs.
      - name: Run tests (core crates)
        if: matrix.os != 'ubuntu-latest'
        run: cargo test -p surtgis-core -p surtgis-algorithms -p surtgis-cloud -p surtgis-relief -p surtgis-colormap

  test-no-parallel:
    name: Test (no parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libhdf5-dev libnetcdf-dev libeccodes-dev pkg-config
      - name: Run tests without parallel feature
        run: cargo test --workspace --exclude surtgis-python --no-default-features

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM with wasm-pack
        run: wasm-pack build crates/wasm --target bundler --release --out-dir ../../pkg
      - name: Verify exported functions
        run: |
          COUNT=$(grep -c "export function" pkg/surtgis_wasm.d.ts)
          echo "Exported functions: $COUNT"
          if [ "$COUNT" -lt 55 ]; then
            echo "ERROR: Expected at least 55 exported functions, got $COUNT"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Runs the same #[wasm_bindgen_test] functions the "test" job already
      # runs natively (via `unsupported = test`), plus any wasm32-only
      # cases (e.g. JsValue-constructing error paths, which panic on
      # native targets) that can only execute here, in Node's wasm engine.
      - name: Run wasm_bindgen_test suite (Node)
        run: wasm-pack test --node crates/wasm

  web-build:
    name: Web Demo Build
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/wasm --target bundler --release --out-dir ../../pkg
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install & build web demo
        working-directory: web
        run: npm ci && npm run build

  python:
    name: Python Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install maturin numpy pytest
      - name: Build Python package
        run: maturin build --manifest-path crates/python/Cargo.toml --release
      # The wheel is imported and exercised before it can ever reach PyPI —
      # previously CI only built it, so a broken signature or a
      # GIL-holding regression would ship silently.
      - name: Install wheel and run pytest
        run: |
          pip install target/wheels/surtgis-*.whl
          pytest crates/python/tests/ -v

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check


  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      # surtgis (CLI) pulls netcdf/grib by default; same system libs as the
      # main build job.
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libhdf5-dev libnetcdf-dev libeccodes-dev pkg-config
      # Default features only: verifying the declared rust-version across all
      # 9 default-member (publishable) crates without dragging system libs
      # (gui, relief-3d) into the job.
      - name: Check with MSRV toolchain
        run: cargo +1.88.0 check -p surtgis-core -p surtgis-algorithms -p surtgis-parallel -p surtgis-relief -p surtgis-colormap -p surtgis-cloud -p surtgis -p surtgis-wasm -p surtgis-python

  deny:
    name: cargo-deny (advisories, licenses, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources

  integration:
    name: Integration Tests (real DEM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Fixtures are ~10 MB of real rasters kept out of git history; they
      # live as assets on the `test-fixtures-v1` prerelease and are
      # integrity-checked here. Before this, the fixture was simply absent
      # in CI and both real-DEM suites silently never ran (green job, zero
      # tests executed).
      - name: Download test fixtures
        run: |
          mkdir -p tests/fixtures
          cd tests/fixtures
          for f in andes_chile_30m.tif andes_chile_30m_utm.tif \
                   gdal_slope.tif gdal_aspect.tif grass_slope.tif grass_aspect.tif; do
            gh release download test-fixtures-v1 --pattern "$f" --repo "$GITHUB_REPOSITORY"
          done
          sha256sum -c <<'SUMS'
          2b40c5c0be6cb24cffc8d8131e2cd48733163c330390435ca27edf190980220a  andes_chile_30m.tif
          5a4f5a83b86121fd161019a6f2c8905681fead3f47e20843df1ed0bec409eeb2  andes_chile_30m_utm.tif
          7a31133004d19121381e266b34b195d56e088f0b95d8150b4dd75387ebf3f2f1  gdal_aspect.tif
          ffe537ca2f33c97432ae841798bae4c310cc428980b0ea6ef60917543cbe0e40  gdal_slope.tif
          1b2062aa1c7407de151a955ebbc680065c4a007d0d603a389ab8591074ec95cf  grass_aspect.tif
          521434d1bd9a030cbff42a66b58144f294867c55c302ecf0406dcd10799e9e86  grass_slope.tif
          SUMS
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run real-DEM integration tests
        run: cargo test --test integration_real_dem --package surtgis-algorithms
      - name: Run GDAL/GRASS cross-validation
        run: cargo test --test cross_validation_gdal_grass --package surtgis-algorithms -- --nocapture

  bench:
    name: Benchmarks (dry run)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile benchmarks
        run: cargo bench --no-run --package surtgis-algorithms

  stac-ram-bench:
    name: STAC composite RAM (nightly)
    runs-on: ubuntu-latest
    # Runs on schedule + manual dispatch only; net-dependent (Earth Search),
    # would be flaky per-PR and redundant per-push on main.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build surtgis release
        run: cargo build --release -p surtgis --bin surtgis
      - name: Run RAM benchmark
        env:
          THRESHOLD_MB: "2000"
        run: bash benchmarks/bench_stac_ram.sh
