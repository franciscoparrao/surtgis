name: Python wheels (PyPI)

# Builds platform-specific Python wheels for the `surtgis` PyO3 binding and
# publishes them to PyPI.
#
# Coverage:
#   - Linux x86_64 (manylinux + musllinux)
#   - Linux aarch64 (manylinux + musllinux, cross-compiled via QEMU)
#   - macOS x86_64
#   - macOS arm64
#   - Windows x86_64
# CPython 3.9 through 3.13.
#
# Triggers:
#   - Tag push matching v*  (auto-release on the same tag that triggers the CLI
#     binary release in release.yml).
#   - workflow_dispatch with a tag input (manual rerun against an existing tag,
#     useful for the v0.7.0 catch-up where the CLI binary tag was pushed before
#     this workflow existed).
#
# Authentication: PyPI Trusted Publishing (no API token needed). One-time setup
# on the PyPI side:
#   1. https://pypi.org/manage/project/surtgis/settings/publishing/
#   2. Add a pending publisher:
#        Owner:    franciscoparrao
#        Repo:     surtgis
#        Workflow: python-release.yml
#        Env:      pypi
#   3. The first run of this workflow registers the trust, after which subsequent
#      tag pushes publish without manual intervention.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and publish wheels for'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist --interpreter "3.9 3.10 3.11 3.12 3.13"
          sccache: true
          working-directory: crates/python

      - name: Build wheels (musllinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --out dist --interpreter "3.9 3.10 3.11 3.12 3.13"
          sccache: true
          working-directory: crates/python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/python/dist/*.whl
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter "3.9 3.10 3.11 3.12 3.13"
          sccache: true
          working-directory: crates/python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/python/dist/*.whl
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --interpreter "3.9 3.10 3.11 3.12 3.13"
          sccache: true
          working-directory: crates/python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: crates/python/dist/*.whl
          if-no-files-found: error

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/python

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/python/dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/surtgis
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
