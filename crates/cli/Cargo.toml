[package]
name = "surtgis"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "High-performance geospatial analysis CLI"
keywords = ["gis", "cli", "geospatial", "raster", "terrain"]
categories = ["science::geo", "command-line-utilities"]

[[bin]]
name = "surtgis"
path = "src/main.rs"

[features]
default = ["cloud", "zarr", "netcdf", "grib", "projections"]
gdal = ["surtgis-core/gdal"]
cloud = ["dep:surtgis-cloud"]
zarr = ["surtgis-cloud/zarr", "dep:chrono"]
netcdf = ["surtgis-cloud/netcdf"]
grib = ["surtgis-cloud/grib"]
projections = ["surtgis-cloud/projections"]
ml = ["dep:smelt-ml", "dep:csv"]

[dependencies]
surtgis-core = { version = "0.6.0", path = "../core", features = ["shapefile", "geopackage"] }
surtgis-algorithms = { version = "0.6.0", path = "../algorithms" }
surtgis-parallel = { version = "0.6.0", path = "../parallel" }
surtgis-cloud = { version = "0.6.0", path = "../cloud", features = ["native"], optional = true }
clap.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
indicatif.workspace = true
serde_json.workspace = true
serde = { workspace = true, features = ["derive"] }
reqwest = { workspace = true, features = ["json"] }
tokio = { workspace = true, features = ["rt", "macros"] }
ndarray.workspace = true
smelt-ml = { workspace = true, optional = true }
csv = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
geo.workspace = true
