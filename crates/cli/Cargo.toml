[package]
name = "surtgis"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "High-performance geospatial analysis CLI"
keywords = ["gis", "cli", "geospatial", "raster", "terrain"]
categories = ["science::geo", "command-line-utilities"]

[[bin]]
name = "surtgis"
path = "src/main.rs"

[features]
default = ["cloud"]
gdal = ["surtgis-core/gdal"]
cloud = ["dep:surtgis-cloud"]

[dependencies]
surtgis-core = { version = "0.1.0", path = "../core" }
surtgis-algorithms = { version = "0.1.0", path = "../algorithms" }
surtgis-parallel = { version = "0.1.0", path = "../parallel" }
surtgis-cloud = { version = "0.1.0", path = "../cloud", features = ["native"], optional = true }
clap.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
indicatif.workspace = true
serde_json.workspace = true
ndarray.workspace = true
